name: Validar sitio

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verificar sitio
        run: node tests/smoke.mjs
